<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Profile – ASA Pharma</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- Navbar -->
<header class="topbar">
  <div class="logo">ASA Pharma</div>
  <nav class="nav-actions">
    <a href="shopping.html" class="nav-btn">Shop</a>
    <a href="cart.html" class="nav-btn">Cart</a>
  </nav>
</header>

<main class="profile-container">

  <!-- Profile Card -->
  <section class="profile-card" id="profileView">
    <h2>My Profile</h2>

    <div class="profile-row">
      <span>Name</span>
      <strong id="profileName">Loading...</strong>
    </div>

    <div class="profile-row">
      <span>Email</span>
      <strong id="profileEmail">Loading...</strong>
    </div>

    <div class="profile-row">
      <span>Phone</span>
      <strong id="profilePhone">Loading...</strong>
    </div>

    <div class="profile-row">
      <span>Address</span>
      <strong id="profileAddress">Loading...</strong>
    </div>

    <div class="profile-row">
      <span>Role</span>
      <strong id="profileRole">Loading...</strong>
    </div>

    <button class="btn primary" onclick="toggleEdit(true)">
      Edit Profile
    </button>
  </section>

  <!-- Edit Profile Card (Hidden by default) -->
  <section class="profile-card" id="profileEdit" style="display: none;">
    <h2>Edit Profile</h2>

    <div class="profile-row">
      <span>Name</span>
      <input type="text" id="editName" class="profile-input" />
    </div>

    <div class="profile-row">
      <span>Email</span>
      <input type="email" id="editEmail" class="profile-input" />
    </div>

    <div class="profile-row">
      <span>Phone</span>
      <input type="text" id="editPhone" class="profile-input" />
    </div>

    <div class="profile-row">
      <span>Address</span>
      <input type="text" id="editAddress" class="profile-input" />
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button class="btn primary" onclick="saveProfile()" style="flex: 1;">Save Changes</button>
      <button class="btn" onclick="toggleEdit(false)" style="flex: 1; background: #eee; color: #333;">Cancel</button>
    </div>
  </section>

</main>

<script src="js/config.js"></script>`n  <script src="js/profile.js"></script>
</body>
</html>
