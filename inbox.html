<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inbox – ASA Pharma</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="topbar">
  <div class="logo">ASA Pharma – Manager</div>
  <nav class="nav-actions">
    <a href="manager.html" class="nav-btn">Inventory</a>
  </nav>
</header>

<main class="inbox-container">

  <!-- LEFT: MESSAGE LIST -->
  <section class="inbox-list">
    <h2>Inbox</h2>
    <ul id="messageList">
      <!-- Messages injected via JS -->
    </ul>
  </section>

  <!-- RIGHT: MESSAGE VIEW -->
  <section class="inbox-view">
    <h2>Message</h2>
    <div id="messageContent" class="message-content">
      <p>Select a message to read</p>
    </div>
  </section>

</main>

<script src="js/inbox.js"></script>
</body>
</html>
